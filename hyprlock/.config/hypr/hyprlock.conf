general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
    contrast = 0.9
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(e0789a)
    inner_color = rgb(221a1a)
    font_color = rgb(f8f8f2)
    fade_on_empty = true
    placeholder_text = <i>🔮 Mot de passe...</i>
    hide_input = false
    check_color = rgb(69ff94)
    fail_color = rgb(ff6e6e)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(f8f8f2ff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A %d %B %Y")"
    color = rgba(e0789aff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = 🔮 Grimoire
    color = rgba(bfbdb6ff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -200
    halign = center
    valign = center
}
